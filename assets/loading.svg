<svg width="800" height="110" viewBox="0 0 800 110" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="110" rx="24" fill="#080C10"/>
  <rect x="24" y="24" width="752" height="62" rx="18" fill="#0D1320" stroke="#23314A"/>
  <line x1="48" y1="55" x2="752" y2="55" stroke="url(#flow)" stroke-width="4" stroke-linecap="round">
    <animate attributeName="x2" values="752;48;752" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.45;1;0.45" dur="1.8s" repeatCount="indefinite"/>
  </line>
  <circle cx="96" cy="55" r="7" fill="#00FFFF">
    <animate attributeName="r" values="5;9;5" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="704" cy="55" r="7" fill="#6A5ACD">
    <animate attributeName="r" values="5;9;5" dur="1.4s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <defs>
    <linearGradient id="flow" x1="48" y1="55" x2="752" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00FFFF"/>
      <stop offset="1" stop-color="#6A5ACD"/>
    </linearGradient>
  </defs>
</svg>
