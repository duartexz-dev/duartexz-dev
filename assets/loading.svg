<svg width="720" height="90" viewBox="0 0 720 90" xmlns="http://www.w3.org/2000/svg">
  <rect width="720" height="90" rx="20" fill="#0B1120"/>
  <rect x="20" y="20" width="680" height="50" rx="16" fill="#0F172A" stroke="#23314A"/>
  <line x1="42" y1="45" x2="678" y2="45" stroke="url(#line)" stroke-width="4" stroke-linecap="round">
    <animate attributeName="stroke-opacity" values="0.45;1;0.45" dur="1.6s" repeatCount="indefinite"/>
  </line>
  <circle cx="96" cy="45" r="6" fill="#38BDF8">
    <animate attributeName="r" values="4;8;4" dur="1.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="624" cy="45" r="6" fill="#818CF8">
    <animate attributeName="r" values="4;8;4" dur="1.3s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <defs>
    <linearGradient id="line" x1="42" y1="45" x2="678" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#818CF8"/>
