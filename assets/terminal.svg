<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="40" x2="710" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="0.5" stop-color="#121C31"/>
      <stop offset="1" stop-color="#080B16"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="56" x2="650" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="glow" x="-20" y="-20" width="840" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="784" height="224" rx="24" fill="url(#bg)"/>
  <rect x="8" y="8" width="784" height="224" rx="24" stroke="#23314A" stroke-width="1.2"/>

  <circle cx="150" cy="76" r="58" fill="#38BDF8" fill-opacity="0.12"/>
  <circle cx="650" cy="170" r="74" fill="#818CF8" fill-opacity="0.12"/>
  <circle cx="610" cy="70" r="30" fill="#38BDF8" fill-opacity="0.1"/>

  <g filter="url(#glow)" opacity="0.65">
    <circle cx="150" cy="76" r="36">
      <animate attributeName="cx" values="150;178;150" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="76;54;76" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="170" r="44">
      <animate attributeName="cx" values="650;626;650" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="170;144;170" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="74" y="112" fill="url(#accent)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="2">ARTHUR DUARTE</text>
  <text x="74" y="144" fill="#E2E8F0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="500">Advanced DOM • REST APIs • Clean architecture</text>

  <text x="74" y="178" fill="#94A3B8" font-family="Consolas, monospace" font-size="15">
    <tspan>const</tspan>
    <tspan fill="#38BDF8"> focus</tspan>
    <tspan> = </tspan>
    <tspan fill="#818CF8">'precision + iteration'</tspan>
    <animate attributeName="opacity" values="0.35;1;0.35" dur="1.8s" repeatCount="indefinite"/>
  </text>
</svg>
