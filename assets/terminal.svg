<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="50" x2="720" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080C10"/>
      <stop offset="0.5" stop-color="#10182A"/>
      <stop offset="1" stop-color="#06080D"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="70" x2="640" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00FFFF">
        <animate attributeName="stop-color" values="#00FFFF;#6A5ACD;#00FFFF" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#6A5ACD">
        <animate attributeName="stop-color" values="#6A5ACD;#00FFFF;#6A5ACD" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-40" y="-40" width="880" height="360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="784" height="264" rx="26" fill="url(#bg)"/>
  <rect x="8" y="8" width="784" height="264" rx="26" stroke="#23314A" stroke-width="1.3"/>

  <g filter="url(#glow)" opacity="0.8">
    <path d="M138 80c34-43 95-55 132-26 28 22 28 67 0 90-35 29-91 30-132 0-25-19-25-50 0-64Z" fill="#00FFFF" fill-opacity="0.10"/>
    <path d="M616 178c42-49 108-59 152-30 34 23 44 74 17 108-29 36-86 48-130 30-42-17-60-63-39-108Z" fill="#6A5ACD" fill-opacity="0.12"/>
    <path d="M520 78c20-20 46-24 72-12 20 10 33 35 28 58-6 28-29 44-56 44-26 0-50-12-61-38-9-26 2-49 17-52Z" fill="#00FFFF" fill-opacity="0.08"/>
  </g>

  <g fill="#00FFFF" fill-opacity="0.8">
    <circle cx="140" cy="72" r="6"/>
    <circle cx="166" cy="72" r="6"/>
    <circle cx="192" cy="72" r="6"/>
  </g>

  <g transform="translate(120 86)" opacity="0.9">
    <path d="M0 16h84" stroke="#00FFFF" stroke-width="2" stroke-linecap="round"/>
    <path d="M0 40h122" stroke="#6A5ACD" stroke-width="2" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" values="120 86;132 90;120 86" dur="7s" repeatCount="indefinite"/>
  </g>

  <text x="74" y="128" fill="url(#accent)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="2">ARTHUR DUARTE</text>
  <text x="74" y="162" fill="#E5ECF6" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="15" font-weight="500">advanced DOM • REST APIs • clean architecture</text>

  <text x="74" y="198" fill="#708090" font-family="Consolas, monospace" font-size="14">
    <tspan>const</tspan>
    <tspan fill="#00FFFF"> signal</tspan>
    <tspan> = </tspan>
    <tspan fill="#6A5ACD">'neon logic'</tspan>
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2s" repeatCount="indefinite"/>
  </text>
</svg>
