<svg width="760" height="220" viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#090C12"/>
      <stop offset="100%" stop-color="#111720"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6A5ACD"/>
      <stop offset="100%" stop-color="#69E0FF"/>
    </linearGradient>
  </defs>
  <rect width="760" height="220" rx="28" fill="url(#bg)" stroke="#1F2937" stroke-width="1.5"/>
  <text x="48" y="62" fill="#A8B2D1" font-family="Consolas, monospace" font-size="18">> system.launch("profile")</text>

  <g fill="#E2E8F0" font-family="Consolas, monospace" font-size="24" letter-spacing="0.2">
    <text x="52" y="108" opacity="0">
      <tspan>Arthur Duarte</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.5s" fill="freeze"/>
    </text>
    <text x="52" y="146" opacity="0">
      <tspan>Software Engineering Student</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.1s" fill="freeze"/>
    </text>
    <text x="52" y="184" opacity="0">
      <tspan>Cybersecurity Enthusiast</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.7s" fill="freeze"/>
    </text>
    <text x="52" y="222" opacity="0">
      <tspan>Why not you?</tspan>
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.3s" fill="freeze"/>
    </text>
  </g>

  <rect x="52" y="188" width="10" height="26" rx="4" fill="#69E0FF" opacity="0.9">
    <animate attributeName="opacity" values="0;1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
